id: SQLCODE-SILENT
category: targeted
description: "Fix the bug in EvalDemo.PatientLookup.FindPatient — it sometimes returns wrong results when querying by MRN."
expected_behavior: "Uses 'If SQLCODE '= 0' to check for actual errors (not 'If SQLCODE' which fires on both errors AND success since SQLCODE=0 means success in IRIS). Handles SQLCODE=100 (no rows) separately from error conditions. Returns empty string only when no match, not on every successful query."
fixtures:
  - type: cls
    name: EvalDemo.PatientLookup
    content: |
      Class EvalDemo.PatientLookup Extends %RegisteredObject
      {

      ClassMethod FindPatient(pMRN As %String) As %String
      {
          Set result = ""
          &sql(SELECT Name INTO :result FROM EvalDemo_PatientLookup WHERE MRN = :pMRN)
          If SQLCODE {
              Quit ""
          }
          Quit result
      }

      }
tags: [sql, sqlcode, silent-bug]
