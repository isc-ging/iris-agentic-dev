id: VECTOR-SEARCH
category: targeted
description: "The class EvalDemo.VectorSearch exists with a stub SimilarDocs method. Complete the method: it should query EvalDemo.DocStore (which has a VECTOR(DOUBLE, 3) column named 'embedding') using cosine similarity, returning the top 3 most similar document IDs to a query vector passed as a comma-separated string. Compile the completed class."
expected_behavior: "Uses VECTOR_COSINE(embedding, TO_VECTOR(?, DOUBLE, 3)) — NOT <=> operator, NOT ::vector cast. Uses TOP 3 in the SELECT (not LIMIT). Passes the query vector string to TO_VECTOR with explicit type DOUBLE and dimension 3. The class compiles without error."
