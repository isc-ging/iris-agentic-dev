id: SQLCODE-CHECK
category: targeted
description: "The method Bench.Lookup.FindByName exists but has a bug in how it checks SQLCODE after the SQL query. Fix the bug so it correctly detects errors and returns -1 when no patient is found."
expected_behavior: "Uses SQLCODE '= 0 to check for SQL errors (not 'If SQLCODE' which is 0=success in IRIS). Uses SQLCODE = 100 to detect no rows found. Returns PatientId on success, -1 if not found, and propagates errors properly. Compiles without error."
fixtures:
  - type: cls
    name: Bench.Patient
    content: |
      Class Bench.Patient Extends %Persistent
      {
      Property Name As %String;
      Storage Default
      {
      <Data name="PatientDefaultData"><Attribute>%%CLASSNAME</Attribute><Structure>listnode</Structure><Subscript/></Data>
      <DataLocation>^Bench.PatientD</DataLocation>
      <DefaultData>PatientDefaultData</DefaultData>
      <ExtentSize>100000</ExtentSize>
      <IdLocation>^Bench.PatientD</IdLocation>
      <IndexLocation>^Bench.PatientI</IndexLocation>
      <StreamLocation>^Bench.PatientS</StreamLocation>
      <Type>%Storage.Persistent</Type>
      }
      }
  - type: cls
    name: Bench.Lookup
    content: |
      Class Bench.Lookup Extends %RegisteredObject
      {

      /// Bug: SQLCODE check is wrong — SQLCODE=0 means SUCCESS in IRIS (not failure)
      ClassMethod FindByName(pName As %String) As %Integer
      {
          Set tId = -1
          &sql(SELECT %ID INTO :tId FROM Bench.Patient WHERE Name = :pName)
          If SQLCODE {
              // This branch runs on SUCCESS (SQLCODE=0 is falsy... wait, 0 is falsy)
              // Actually this runs when SQLCODE != 0, which includes both errors AND no-rows
              // The bug: treats SQLCODE=100 (no rows) same as errors
              Quit -1
          }
          Quit tId
      }

      }
tags: [sql, sqlcode, error-checking]
