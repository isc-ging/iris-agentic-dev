name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: clippy, rustfmt
      - name: Install mold linker
        run: sudo apt-get install -y mold
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      # Build binary first (required for mcp_handshake/plugin_dispatch/benchmark_relocated
      # tests, which spawn it as a subprocess).
      - run: cargo build --workspace
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      # Runs EVERY declared test target across both crates — no hardcoded --test list.
      # A hand-maintained list drifts silently as new #[[test]] targets are added (this
      # bit us for real: 66 of 83 targets were missing from this job before, including
      # a genuinely broken plugin-dispatch feature that no test run ever caught). Tests
      # requiring live IRIS self-skip via an IRIS_HOST-is-empty check or #[ignore] — they
      # run for real in the e2e-tests job below, where a live container is up.
      #
      # --test-threads=1: several test files mutate process-global env vars (e.g.
      # IRIS_WEB_PREFIX) under their own in-file mutex, which only serializes tests
      # within that one binary — cargo runs each test binary as a separate process, but
      # --workspace --all-targets can still schedule multiple *binaries* concurrently,
      # and process env vars are inherited, not isolated, so two binaries' tests can
      # race on the same var. Verified: flakes under default parallelism, 100% stable
      # at --test-threads=1 (whole run: ~20s, negligible cost for correctness here).
      - run: cargo test --workspace --all-targets --features testing --no-fail-fast -- --test-threads=1
        env:
          RUST_LOG: warn
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

  benchmark-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - name: Verify benchmark task YAML parses clean
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, 'benchmark/021/runner')
          from task_loader import load_tasks
          tasks = load_tasks()
          print(f'OK: {len(tasks)} tasks loaded and validated')
          "

  windows-handshake:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p iris-agentic-dev
      - name: MCP handshake smoke test on Windows
        shell: pwsh
        run: |
          $init = '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1"}}}'
          # Ignore exit code from iris-agentic-dev — it exits non-zero when stdin closes
          $result = $init | & "target\debug\iris-agentic-dev.exe" mcp 2>$null
          $exitCode = $LASTEXITCODE
          Write-Host "Response: $result"
          Write-Host "Binary exit code: $exitCode (expected non-zero — stdin closed)"
          if ($result -match '"capabilities"') {
            Write-Host "PASS: capabilities advertised on Windows"
            exit 0
          } else {
            Write-Host "FAIL: no capabilities in response. Got: $result"
            exit 1
          }

  e2e-tests:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    # Three-version matrix — catches API compatibility regressions across IRIS generations.
    # NOTE: community image licenses expire ~150 days after image publish date. When an image
    # starts failing with "Community License expired", replace it with a newer published image.
    # Last updated: 2026-07-13 (2023.1/2025.1 expired; replaced with 2026.1/2026.2)
    #   2026.1  — stable release; Atelier V8, published 2026-06-10
    #   2026.2  — preview/CD build; published 2026-06-04
    # Each version runs in its own job so a regression on one version never masks another.
    strategy:
      fail-fast: false
      matrix:
        include:
          - iris_version: "2026.1"
            iris_image: "intersystemsdc/iris-community:2026.1"
            initial_wait_secs: 90
          - iris_version: "2026.2"
            iris_image: "intersystemsdc/iris-community:2026.2"
            initial_wait_secs: 90
    name: "e2e-tests (IRIS ${{ matrix.iris_version }})"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: Swatinem/rust-cache@v2
        with:
          # Separate cache per IRIS version so a binary built against one version
          # doesn't silently run against another.
          key: "iris-${{ matrix.iris_version }}"
      - run: cargo build -p iris-agentic-dev
      - name: Start IRIS container
        run: |
          docker run -d --name iris-e2e \
            -p 52773:52773 \
            --shm-size 1g \
            --ulimit nofile=65536:65536 \
            -e IRIS_PASSWORD=SYS \
            -e IRIS_USERNAME=_SYSTEM \
            ${{ matrix.iris_image }}
          # Wait for container to be running and dump early logs for diagnostics
          sleep 15
          docker ps -a | grep iris-e2e
          echo "=== Early container logs ==="
          docker logs iris-e2e 2>&1 | head -40 || true
      - name: Wait for IRIS Atelier API to be ready (up to 7 minutes)
        run: |
          IRIS_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' iris-e2e)
          echo "IRIS container IP: $IRIS_IP"
          # Wait for IRIS process to start first (duration varies by version — older images start slower)
          echo "Waiting ${{ matrix.initial_wait_secs }}s for IRIS to initialize..."
          sleep ${{ matrix.initial_wait_secs }}
          # Then poll for the web server
          for i in $(seq 1 60); do
            for host in $IRIS_IP localhost; do
              status=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 \
                -u _SYSTEM:SYS "http://$host:52773/api/atelier/" 2>/dev/null || echo "000")
              if [ "$status" = "200" ] || [ "$status" = "401" ]; then
                echo "IRIS Atelier API ready at $host:52773 (HTTP $status)"
                echo "IRIS_HOST=$host" >> $GITHUB_ENV
                exit 0
              fi
              echo "  $host: HTTP $status"
            done
            echo "Waiting... (attempt $i/60)"
            sleep 5
          done
          echo "IRIS did not become ready in 7 minutes"
          echo "=== Full container logs ==="
          docker logs iris-e2e 2>&1 | tail -80
          exit 1
      - name: Detect and set IRIS credentials
        run: |
          HOST=${{ env.IRIS_HOST }}
          # IRIS 2025+ community images use SuperUser/SYS for Atelier REST
          for user_pass in "_SYSTEM:SYS" "SuperUser:SYS" "_SYSTEM:sys" "SuperUser:sys"; do
            user="${user_pass%%:*}"
            pass="${user_pass##*:}"
            status=$(curl -s -o /dev/null -w "%{http_code}" -u "$user:$pass" "http://$HOST:52773/api/atelier/" 2>/dev/null)
            if [ "$status" = "200" ]; then
              echo "IRIS_USERNAME=$user" >> $GITHUB_ENV
              echo "IRIS_PASSWORD=$pass" >> $GITHUB_ENV
              echo "Using credentials: $user (HTTP $status)"
              exit 0
            fi
            echo "  $user:$pass — HTTP $status"
          done
          echo "WARNING: Could not authenticate with any known credentials"
          echo "IRIS_USERNAME=_SYSTEM" >> $GITHUB_ENV
          echo "IRIS_PASSWORD=SYS" >> $GITHUB_ENV
      - name: Create UnitTest directories in IRIS container
        run: |
          # iris_test uses RunTest which needs pre-existing directories with .cls files
          # RunTest /load looks for .cls files in ^UnitTestRoot/PackageName/
          docker exec iris-e2e bash -c 'mkdir -p /tmp/httest/IrisDevRunTest'
          # Write class file using printf to avoid YAML/heredoc quoting issues
          docker exec iris-e2e bash -c 'printf "Class IrisDevRunTest.UnitTestSuite Extends %%UnitTest.TestCase {\nMethod TestAlwaysPasses() { Do \$\$\$AssertEquals(1,1) }\nMethod TestAlwaysFails() { Do \$\$\$AssertEquals(1,2) }\n}" > /tmp/httest/IrisDevRunTest/UnitTestSuite.cls'
          echo "Created /tmp/httest/IrisDevRunTest/UnitTestSuite.cls in iris-e2e container"
      - name: Configure SCM in USER namespace for SCM e2e tests
        run: |
          HOST=${{ env.IRIS_HOST }}
          USER=${{ env.IRIS_USERNAME }}
          PASS=${{ env.IRIS_PASSWORD }}
          # Set %Studio.SourceControl.Default as the SCM class for USER namespace.
          # This is IRIS's built-in no-op SCM stub — it implements the full interface
          # (IsEditable, UserAction, OnMenuItem, etc.) without any external VCS dependency.
          # Required so that iris_source_control status tests exercise the controlled code
          # path (GetStatus returns inSC=1) rather than always returning UNCONTROLLED.
          curl -s -X POST \
            -u "$USER:$PASS" \
            -H "Content-Type: application/json" \
            -d '{"query":"SET ^%SYS(\"Studio\",\"SourceControl\",\"USER\")=\"%Studio.SourceControl.Default\""}' \
            "http://$HOST:52773/api/atelier/v1/USER/action/query" | cat
          echo "SCM configured for USER namespace"
      # Runs EVERY declared test target across both crates against a live IRIS
      # container, --include-ignored so #[ignore]'d live-IRIS tests actually execute
      # (that flag was missing here before and silently skipped ~600 tests in the
      # very files this job exists to run). No hardcoded --test list — see the
      # `test` job above for why that's load-bearing, not stylistic.
      #
      # A small --skip list is still needed for tests that are #[ignore]'d for reasons
      # OTHER than "needs live IRIS" — this job's env satisfies the live-IRIS case for
      # everything else, but cannot satisfy these:
      #   - discovery_tests: 2 tests assert NotFound behavior and explicitly require an
      #     env with NO IRIS_HOST/IRIS_CONTAINER set — the opposite of this job's env.
      #   - test_sm_e2e: needs a real VS Code Server Manager install + OS keychain
      #     entry, which cannot exist on a CI runner.
      #   - docker_discovery_e2e: needs enterprise IRIS_LICENSE_KEY_PATH or spinning up
      #     separate throwaway containers with specific port-mapping states, not the
      #     one general-purpose container this job provides.
      #   - test_benchmark_live: 2 tests exercise the LLM fix-proposal path and need
      #     IRIS_GENERATE_CLASS_MODEL + a real API key, which CI does not have.
      #   - test_admin_webapp_crud: Security.Applications.Create() calls
      #     %ZHSLIB.HealthShareMgr internally, which doesn't exist on Community
      #     edition (confirmed via %ExistsId=0) — needs an Enterprise/Ensemble image.
      #   - discover_via_docker_named_finds_real_container: hardcodes the container
      #     name "iris-dev-iris" (a personal dev machine's convention); this job's
      #     container is named iris-e2e. The rest of test_discovery_docker_live.rs
      #     (5 tests) has no such hardcoding and passes here.
      #   - test_scm_*_via_wiremock / test_search_sync_with_wiremock_null_work_id:
      #     these tests spin up their own wiremock MockServer in-process but the CI
      #     environment's IRIS_HOST is set, which causes the handler to attempt a
      #     real IRIS call instead of hitting the mock. They pass fine in the `test`
      #     job (no IRIS_HOST set) and are NOT skipped there.
      # --test-threads=1: same cross-binary env-var race as the `test` job above (e.g.
      # OBJECTSCRIPT_SKILLMCP_NAMESPACE) — observed here too, intermittently, once in
      # ~5 full runs. The IRIS container startup dominates this job's wall-clock time
      # regardless, so serializing test execution costs little in exchange for no flakes.
      - name: Log Atelier API version
        run: |
          HOST=${{ env.IRIS_HOST }}
          USER=${{ env.IRIS_USERNAME }}
          PASS=${{ env.IRIS_PASSWORD }}
          echo "=== Atelier API info for IRIS ${{ matrix.iris_version }} ==="
          curl -s -u "$USER:$PASS" "http://$HOST:52773/api/atelier/" | head -c 500
      - name: Run full test suite against live IRIS (Rust)
        run: |
          cargo test --workspace --all-targets --features testing --no-fail-fast -- \
            --include-ignored --nocapture --test-threads=1 \
            --skip discover_iris_reads_env_vars \
            --skip discover_iris_returns_none_when_nothing_found \
            --skip e2e_sm_discovery_finds_connection \
            --skip e2e_sm_credential_resolves \
            --skip e2e_sm_tools_work_after_discovery \
            --skip test_all_enterprise_images \
            --skip test_enterprise_web_server_absent_message \
            --skip test_container_not_found_message \
            --skip test_port_not_mapped_message \
            --skip test_all_community_images \
            --skip live_benchmark_run_covers_all_tasks_with_a_verdict \
            --skip live_benchmark_baseline_computes_absolute_difference_lift \
            --skip test_admin_webapp_crud \
            --skip discover_via_docker_named_finds_real_container \
            --skip test_scm_checkout_immediate_success_via_wiremock \
            --skip test_scm_execute_action_code_0_via_wiremock \
            --skip test_scm_execute_action_code_1_via_wiremock \
            --skip test_scm_execute_action_code_7_via_wiremock \
            --skip test_scm_menu_with_actions_via_wiremock \
            --skip test_search_sync_with_wiremock_null_work_id
        env:
          IRIS_HOST: ${{ env.IRIS_HOST }}
          IRIS_WEB_PORT: "52773"
          IRIS_USERNAME: ${{ env.IRIS_USERNAME }}
          IRIS_PASSWORD: ${{ env.IRIS_PASSWORD }}
          IRIS_NAMESPACE: USER
          IRIS_CONTAINER: iris-e2e
          # Exposed so tests can skip/adjust for known version-specific behavior
          IRIS_MATRIX_VERSION: ${{ matrix.iris_version }}

  doc-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: README config path sanity check
        run: |
          # Wrong path: Claude Code MCP config is ~/.claude.json, not ~/.claude/settings.json
          if grep -rn '~/.claude/settings.json' README.md docs/ 2>/dev/null; then
            echo "FAIL: README references ~/.claude/settings.json — correct path is ~/.claude.json"
            exit 1
          fi
          echo "OK: no wrong config path found"

          # Correct path must be documented
          if ! grep -q '~/.claude.json' README.md; then
            echo "FAIL: README does not mention ~/.claude.json"
            exit 1
          fi
          echo "OK: ~/.claude.json documented"

          # Validate complete JSON objects/arrays in README (skip intentional fragments)
          # Also validate mcpServers blocks match Claude Code / OpenCode schema
          python3 - <<'PYEOF'
          import re, json, sys

          readme = open("README.md").read()
          blocks = re.findall(r'```json\n(.*?)\n```', readme, re.DOTALL)
          errors = []
          skipped = 0

          # Valid top-level keys for each MCP client config format:
          #   Claude Code (~/.claude.json):    mcpServers
          #   OpenCode (~/.opencode/config.json): mcp.providers or mcp (object with tool entries)
          #   Cursor/VS Code:                  mcpServers (same as Claude Code)
          KNOWN_MCP_ROOTS = {"mcpServers", "mcp"}

          # Required fields for each server entry under mcpServers
          # Claude Code format: { "command": str, "args": [...], "env": {...} }
          MCP_SERVER_REQUIRED = {"command"}
          MCP_SERVER_ALLOWED  = {"command", "args", "env", "type", "enabled", "environment"}

          def validate_mcp_servers(data, block_num):
              errs = []
              servers = data.get("mcpServers", {})
              if not isinstance(servers, dict):
                  errs.append(f"Block {block_num}: mcpServers must be an object")
                  return errs
              for name, cfg in servers.items():
                  if not isinstance(cfg, dict):
                      errs.append(f"Block {block_num}: mcpServers.{name} must be an object")
                      continue
                  missing = MCP_SERVER_REQUIRED - cfg.keys()
                  if missing:
                      errs.append(f"Block {block_num}: mcpServers.{name} missing required field(s): {missing}")
                  unknown = cfg.keys() - MCP_SERVER_ALLOWED
                  if unknown:
                      errs.append(f"Block {block_num}: mcpServers.{name} has unrecognized field(s): {unknown}")
                  if "command" in cfg and not isinstance(cfg["command"], str):
                      errs.append(f"Block {block_num}: mcpServers.{name}.command must be a string")
                  if "args" in cfg and not isinstance(cfg["args"], list):
                      errs.append(f"Block {block_num}: mcpServers.{name}.args must be an array")
                  if "env" in cfg and not isinstance(cfg["env"], dict):
                      errs.append(f"Block {block_num}: mcpServers.{name}.env must be an object")
              return errs

          for i, block in enumerate(blocks):
              stripped = block.strip()
              if not (stripped.startswith('{') or stripped.startswith('[')):
                  skipped += 1
                  continue
              try:
                  data = json.loads(block)
              except json.JSONDecodeError as e:
                  errors.append(f"Block {i+1}: invalid JSON — {e}\n{block[:200]}")
                  continue
              # Schema-check blocks that look like MCP client configs
              if isinstance(data, dict) and data.keys() & KNOWN_MCP_ROOTS:
                  if "mcpServers" in data:
                      errors.extend(validate_mcp_servers(data, i+1))

          if errors:
              print("FAIL: README JSON block errors:")
              for e in errors:
                  print(" ", e)
              sys.exit(1)
          validated = len(blocks) - skipped
          print(f"OK: {validated} complete JSON blocks valid (schema-checked), {skipped} fragment(s) skipped")
          PYEOF

  cross-compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl
      - uses: mlugg/setup-zig@v2
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-zigbuild
      - run: cargo zigbuild --release --target x86_64-unknown-linux-musl -p iris-agentic-dev
      - run: file target/x86_64-unknown-linux-musl/release/iris-agentic-dev
      - run: |
          ldd target/x86_64-unknown-linux-musl/release/iris-agentic-dev 2>&1 | grep -q "not a dynamic executable" && echo "SC-002 PASS: static binary confirmed" || echo "NOTE: may have dynamic deps on musl"
