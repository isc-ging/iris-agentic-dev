name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: iris-agentic-dev-linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: iris-agentic-dev-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: iris-agentic-dev-macos-x86_64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: iris-agentic-dev-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
      - run: cargo install cargo-zigbuild
      - run: cargo zigbuild --release --target ${{ matrix.target }} -p iris-agentic-dev
      - name: Stage artifact
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/iris-agentic-dev"
          [[ -f "${src}.exe" ]] && src="${src}.exe"
          cp "$src" "${{ matrix.artifact }}"
      - name: Ad-hoc codesign (macOS only — removes Gatekeeper quarantine hang)
        if: runner.os == 'macOS'
        run: codesign --force --deep --sign - "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd vscode-iris-dev && npm ci && npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-iris-dev/vscode-iris-agentic-dev-*.vsix

  release:
    needs: [build, build-vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            iris-agentic-dev-linux-x86_64
            iris-agentic-dev-macos-arm64
            iris-agentic-dev-macos-x86_64
            iris-agentic-dev-windows-x86_64.exe
            vscode-iris-agentic-dev-*.vsix
          generate_release_notes: true
          body: |
            ## Installation

            ### macOS / Linux — one-liner
            ```bash
            curl -fsSL https://github.com/intersystems-community/iris-agentic-dev/releases/latest/download/iris-agentic-dev-$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m | sed 's/x86_64/x86_64/;s/arm64/arm64/;s/aarch64/arm64/') -o /usr/local/bin/iris-agentic-dev && chmod +x /usr/local/bin/iris-agentic-dev
            ```

            ### Windows
            Download [`iris-agentic-dev-windows-x86_64.exe`](https://github.com/intersystems-community/iris-agentic-dev/releases/latest/download/iris-agentic-dev-windows-x86_64.exe), rename to `iris-agentic-dev.exe`, place on your PATH.
            Or set `iris-agentic-dev.serverPath` in VS Code settings to the full path — no PATH required.

            ### VS Code Extension
            Download `vscode-iris-agentic-dev-*.vsix` and install via **Extensions: Install from VSIX...** in VS Code 1.99+.

            ### Quick start
            ```bash
            # Set your IRIS connection (or use objectscript.conn in VS Code)
            export IRIS_HOST=localhost
            export IRIS_WEB_PORT=52773
            iris-agentic-dev mcp   # start MCP server
            ```

            See the [README](https://github.com/intersystems-community/iris-agentic-dev#readme) for full setup instructions.

            ### Homebrew (macOS / Linux)
            ```bash
            brew tap intersystems-community/tap
            brew install iris-agentic-dev
            ```

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Compute SHA256s
        id: sha
        run: |
          echo "arm64=$(shasum -a 256 iris-agentic-dev-macos-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x86_64=$(shasum -a 256 iris-agentic-dev-macos-x86_64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux=$(shasum -a 256 iris-agentic-dev-linux-x86_64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Update homebrew-tap formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.sha.outputs.version }}
          ARM64: ${{ steps.sha.outputs.arm64 }}
          X86_64: ${{ steps.sha.outputs.x86_64 }}
          LINUX: ${{ steps.sha.outputs.linux }}
        run: |
          TAP_SHA=$(gh api repos/intersystems-community/homebrew-tap/contents/Formula/iris-agentic-dev.rb --jq '.sha')
          export TAP_SHA
          cat > update_formula.py << 'SCRIPT'
          import base64, json, os, subprocess, sys
          v=os.environ['VERSION']; a64=os.environ['ARM64']; x86=os.environ['X86_64']; lnx=os.environ['LINUX']; sha=os.environ['TAP_SHA']
          lines = [
            'class IrisAgenticDev < Formula',
            '  desc "MCP server connecting AI assistants to InterSystems IRIS — compile, test, debug ObjectScript without leaving the chat"',
            '  homepage "https://github.com/intersystems-community/iris-agentic-dev"',
            '  version "' + v + '"',
            '  license "MIT"',
            '',
            '  on_macos do',
            '    on_arm do',
            '      url "https://github.com/intersystems-community/iris-agentic-dev/releases/download/v' + v + '/iris-agentic-dev-macos-arm64"',
            '      sha256 "' + a64 + '"',
            '    end',
            '    on_intel do',
            '      url "https://github.com/intersystems-community/iris-agentic-dev/releases/download/v' + v + '/iris-agentic-dev-macos-x86_64"',
            '      sha256 "' + x86 + '"',
            '    end',
            '  end',
            '',
            '  on_linux do',
            '    on_intel do',
            '      url "https://github.com/intersystems-community/iris-agentic-dev/releases/download/v' + v + '/iris-agentic-dev-linux-x86_64"',
            '      sha256 "' + lnx + '"',
            '    end',
            '  end',
            '',
            '  def install',
            '    bin_name = "iris-agentic-dev-macos-arm64"',
            '    bin_name = "iris-agentic-dev-macos-x86_64" if Hardware::CPU.intel? && OS.mac?',
            '    bin_name = "iris-agentic-dev-linux-x86_64" if OS.linux?',
            '    bin.install bin_name => "iris-agentic-dev"',
            '  end',
            '',
            '  test do',
            '    assert_match "iris-agentic-dev ' + v + '", shell_output("#{bin}/iris-agentic-dev --version")',
            '  end',
            'end',
          ]
          rb = '\n'.join(lines) + '\n'
          payload = json.dumps({'message': 'chore: bump iris-agentic-dev to v' + v, 'content': base64.b64encode(rb.encode()).decode(), 'sha': sha})
          r = subprocess.run(['gh','api','--method','PUT','repos/intersystems-community/homebrew-tap/contents/Formula/iris-agentic-dev.rb','--input','-'], input=payload, capture_output=True, text=True)
          sys.exit(0 if r.returncode==0 else (print(r.stderr,file=sys.stderr) or 1))
          SCRIPT
          python3 update_formula.py
